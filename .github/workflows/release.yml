name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish portable executable
        run: >
          dotnet publish YoutubeMp3/YoutubeMp3.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path publish\* -DestinationPath "YoutubeMp3-$version-win-x64.zip"

      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "YoutubeMp3-${{ github.ref_name }}-win-x64.zip" `
            --title "${{ github.ref_name }}" `
            --generate-notes

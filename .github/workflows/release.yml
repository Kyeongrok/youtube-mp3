name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      # 자체 포함(self-contained): .NET 설치 없이 어디서나 실행되는 단일 exe
      - name: Publish self-contained executable
        run: >
          dotnet publish YoutubeMp3/YoutubeMp3.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      # 프레임워크 종속(framework-dependent): .NET 8 데스크톱 런타임이 설치된 PC용(용량이 작음)
      - name: Publish framework-dependent executable
        run: >
          dotnet publish YoutubeMp3/YoutubeMp3.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -o publish-fd

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path publish\* -DestinationPath "YoutubeMp3-$version-win-x64.zip"
          Compress-Archive -Path publish-fd\* -DestinationPath "YoutubeMp3-$version-win-x64-framework-dependent.zip"
          # 압축 없이 받아서 바로 실행할 수 있도록 self-contained exe를 단독 자산으로도 올린다.
          Copy-Item "publish\YoutubeMp3.exe" "YoutubeMp3-$version-win-x64.exe"

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            "YoutubeMp3-$tag-win-x64.zip",
            "YoutubeMp3-$tag-win-x64-framework-dependent.zip",
            "YoutubeMp3-$tag-win-x64.exe"
          )
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title $tag --generate-notes
          }
